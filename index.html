    <script>
      /* ── Theme ── */
      function syncThemeIcon() {
        document.getElementById('theme-icon').className =
          document.documentElement.classList.contains('dark')
            ? 'ri-sun-line text-xl'
            : 'ri-moon-line text-xl';
      }
      syncThemeIcon();
      document.getElementById('theme-btn').addEventListener('click', function () {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme',
          document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        syncThemeIcon();
      });

      /* ── Lightbox helpers ── */
      const lb     = document.getElementById('lightbox');
      const lbImg  = document.getElementById('lb-img');
      const lbVid  = document.getElementById('lb-video');
      const lbVSrc = document.getElementById('lb-video-src');

      function openLightbox(type, src) {
        if (type === 'image') {
          lbVid.style.display = 'none'; lbVid.pause();
          lbImg.src = src;
          lbImg.style.display = 'block';
        } else {
          lbImg.style.display = 'none';
          lbVSrc.src = src;
          lbVid.load();
          lbVid.style.display = 'block';
          lbVid.play().catch(function(){});
        }
        lb.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        lb.classList.remove('active');
        lbVid.pause();
        lbImg.src = '';
        document.body.style.overflow = '';
      }

      /* Close on backdrop click */
      lb.addEventListener('click', function (e) {
        if (e.target === lb) closeLightbox();
      });
      /* Close on button */
      document.getElementById('lb-close').addEventListener('click', closeLightbox);
      /* Close on Escape */
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeLightbox();
      });

      /* ── Wire up gallery items ── */
      document.querySelectorAll('.gallery-item').forEach(function (el) {
        el.addEventListener('click', function () {
          openLightbox(el.dataset.type, el.dataset.src);
        });
      });

      /* ── Scroll to top ── */
      var scrollTopBtn = document.getElementById('scroll-top');
      window.addEventListener('scroll', function () {
        if (window.scrollY > 280) scrollTopBtn.classList.add('visible');
        else scrollTopBtn.classList.remove('visible');
      });
      scrollTopBtn.addEventListener('click', function () {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    </script>
  </body>
</html>
